<div class="navbar-container" [class.scrolled]="isScrolled" [class.search-open]="showSearch">

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="nav-logo" routerLink="/homepage" aria-label="Crib – Go to homepage">
        <span class="nav-logo__mark" aria-hidden="true">
          <img
            class="nav-logo__image"
            src="https://res.cloudinary.com/dmb3nvt45/image/upload/v1784451564/yz6vznpaknlwvvosevpu.jpg"
            alt=""
            loading="eager"
          />
        </span>
        <span class="nav-logo__wordmark">
          <span class="nav-logo__word">Crib</span>
          <span class="nav-logo__tagline"></span>
        </span>
      </a>

      <ul class="nav-links" [class.active]="isMenuOpen" id="nav-links" role="list">
        <li class="nav-links__item">
          <a class="nav-links__anchor" routerLink="/homepage" routerLinkActive="is-active" (click)="closeMenu()">
            Home
          </a>
        </li>
        <li class="nav-links__item">
          <a class="nav-links__anchor" routerLink="/about" routerLinkActive="is-active" (click)="closeMenu()">
            About
          </a>
        </li>
        <li class="nav-links__item">
          <a class="nav-links__anchor" routerLink="/service" routerLinkActive="is-active" (click)="closeMenu()">
            Services
          </a>
        </li>
        <li class="nav-links__item">
          <a class="nav-links__anchor" routerLink="/contact" routerLinkActive="is-active" (click)="closeMenu()">
            Contact
          </a>
        </li>

        <li class="nav-links__item" *ngIf="isLoggedIn">
          <a class="nav-links__anchor" routerLink="/profile" routerLinkActive="is-active" (click)="closeMenu()">
            Profile
          </a>
        </li>
        <li class="nav-links__item" *ngIf="isLoggedIn">
          <a class="nav-links__anchor nav-links__anchor--logout" (click)="logout()">
            Logout
          </a>
        </li>

        <li class="nav-links__item" *ngIf="!isLoggedIn">
          <a class="nav-links__anchor" routerLink="/login" routerLinkActive="is-active" (click)="closeMenu()">
            Login
          </a>
        </li>
        <li class="nav-links__item" *ngIf="!isLoggedIn">
          <a class="nav-links__anchor nav-links__anchor--register" routerLink="/account" routerLinkActive="is-active"
            (click)="closeMenu()">
            Register
          </a>
        </li>
      </ul>

      <div class="nav-actions">
        <a class="nav-actions__cta" routerLink="/contact" (click)="closeMenu()">
          <span class="nav-actions__cta-label">List Property</span>
          <svg class="nav-actions__cta-arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </a>
        <button class="nav-hamburger" [class.is-open]="isMenuOpen" (click)="toggleMenu()"
          [attr.aria-expanded]="isMenuOpen" aria-controls="nav-links" aria-label="Toggle menu">
          <span class="nav-hamburger__label">Menu</span>
          <span class="nav-hamburger__bars">
            <span class="nav-hamburger__bar"></span>
            <span class="nav-hamburger__bar"></span>
            <span class="nav-hamburger__bar"></span>
          </span>
        </button>
      </div>

    </div>
  </nav>
</div>
